<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justoria Workday System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
  background:#f8fafc;
  color:#1e293b;
}

/* HEADER */
header {
  display:flex;
  align-items:center;
  padding:25px 50px;
  background:white;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.logo {
  display:flex;
  align-items:center;
  gap:15px;
}

/* 🔥 LOGO ENHANCEMENT */
.logo img {
  height:80px;
  border-radius:50%;
  padding:6px;
  background:linear-gradient(135deg,#0ea5e9,#22c55e);
  box-shadow:0 4px 15px rgba(14,165,233,0.3);
  transition:0.3s;
}

.logo img:hover {
  transform:scale(1.08);
  box-shadow:0 6px 25px rgba(34,197,94,0.5);
}

.logo-text {
  font-size:28px;
  font-weight:700;
  background:linear-gradient(135deg,#0ea5e9,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* HERO */
.hero {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:80px 60px;
  background:linear-gradient(135deg,#0ea5e9,#22c55e);
  color:white;
  gap:40px;
}

.hero-text { max-width:520px; }

.hero h1 {
  font-size:42px;
  margin-bottom:18px;
  line-height:1.2;
}

.hero p {
  font-size:18px;
  margin-bottom:18px;
}

.hero img {
  width:380px;
  border-radius:12px;
}

/* CTA */
.cta {
  display:inline-block;
  background:linear-gradient(90deg,#22c55e,#f59e0b);
  padding:14px 28px;
  border-radius:10px;
  color:white;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
}

.cta:hover { 
  transform:scale(1.05);
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* SECTION */
.section {
  padding:60px 40px;
  text-align:center;
}

/* FEATURES */
.features {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:25px;
}

.feature {
  background:white;
  padding:18px;
  border-radius:10px;
  width:220px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  transition:0.3s;
}

/* 🔥 SUBTLE HOVER LIFE */
.feature:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* PRICING */
.pricing {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:35px;
  flex-wrap:wrap;
}

.card {
  background:white;
  padding:28px;
  border-radius:16px;
  width:270px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
  transition:0.3s;
}

/* 🔥 CARD HOVER = MORE ALIVE */
.card:hover {
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

.featured {
  border:2px solid #f59e0b;
  transform:scale(1.05);
}

.price {
  font-size:32px;
  margin:10px 0;
}

.product-img {
  width:100%;
  height:170px;
  object-fit:contain;
  margin:12px 0;
}

/* TESTIMONIALS */
.testimonials {
  background:#eef2ff;
}

.testimonial-box {
  max-width:700px;
  margin:15px auto;
  font-style:italic;
}

/* WHO THIS IS FOR */
.audience {
  max-width:600px;
  margin:25px auto;
  text-align:left;
}

/* GUARANTEE */
.guarantee {
  background:#ecfdf5;
  padding:25px;
  border-radius:12px;
  max-width:700px;
  margin:25px auto;
}

/* URGENCY */
.urgency {
  background:#fef3c7;
  padding:12px;
  border-radius:10px;
  margin-top:25px;
  font-weight:600;
}

/* FOOTER */
.footer {
  background:linear-gradient(135deg,#0ea5e9,#22c55e);
  color:white;
  padding:40px 20px;
  text-align:center;
}

/* MOBILE */
@media(max-width:900px){
  .hero{ flex-direction:column; text-align:center; }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <div class="logo-text">Justoria</div>
  </div>
</header>

<!-- EVERYTHING ELSE EXACTLY THE SAME -->

</body>
</html>
